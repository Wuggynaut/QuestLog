<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Add Campaign</title>
</head>
<body>
<h1>Sessions</h1>
<a th:href="@{/addsession}">Add new session</a>
<table>
    <tr>
        <th>Date</th>
        <th>Game</th>
        <th>Campaign</th>
        <th>Duration (min)</th>
        <th>Role</th>
        <th>Notes</th>
        <th></th>
    </tr>
    <tr th:each="session : ${sessions}">
        <td th:text="${session.date}"></td>
        <td th:text="${session.game.title}"></td>
        <td th:text="${session.campaign != null ? session.campaign.name : 'One-shot'}"></td>
        <td th:text="${session.duration}"></td>
        <td th:text="${session.role}"></td>
        <td th:text="${session.notes}"></td>
        <td>
            <a th:href="@{/editsession/{id}(id=${session.id})}">Edit</a>
            <a th:href="@{/deletesession/{id}(id=${session.id})}">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
</html>
