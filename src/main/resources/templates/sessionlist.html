<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session List</title>
</head>
<body>
    <div th:replace="~{fragments :: nav}"></div>

    <h1>Sessions</h1>

    <table>
        <tr>
            <th>Date</th>
            <th>Game</th>
            <th>Campaign</th>
            <th sec:authorize="hasRole('ADMIN')">User</th>
            <th>Duration (min)</th>
            <th>Role</th>
            <th>Notes</th>
            <th></th>
        </tr>
        <tr th:each="s : ${sessions}">
            <td th:text="${s.date}"></td>
            <td th:text="${s.game.title}"></td>
            <td th:text="${s.campaign != null ? s.campaign.name : 'One-shot'}"></td>
            <td sec:authorize="hasRole('ADMIN')" th:text="${s.user.username}"></td>
            <td th:text="${s.duration}"></td>
            <td th:text="${s.role}"></td>
            <td th:text="${s.notes}"></td>
            <td>
                <a th:href="@{/editsession/{id}(id=${s.id})}">Edit</a>
                <a th:href="@{/deletesession/{id}(id=${s.id})}">Delete</a>
            </td>
        </tr>
    </table>
    <p><a href="/addsession">Add New Session</a></p>
</body>
</html>
