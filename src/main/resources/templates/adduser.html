<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Add User</title>
</head>
<body>
    <h1>Add User</h1>

    <form method="post" action="#" th:action="@{/saveuser}" th:object="${user}">
        <p>
            <label>Username: <input type="text" th:field="*{username}" /></label>
        </p>
        <p>
            <label>Password: <input type="password" th:field="*{passwordHash}" /></label>
        </p>
        <p>
            <label th:each="r : ${roles}">
                Role:
                <input type="radio" th:field="*{role}" th:value="${r}" th:text="${r}" />
            </label>
        </p>
        <p>
            <input type="submit" value="Add User" />
        </p>
    </form>
</body>
</html>
