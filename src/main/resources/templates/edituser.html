<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
</head>
<body>
    <div th:replace="~{fragments :: nav}"></div>

    <h1>Edit User</h1>
    <form method="post" action="#" th:action="@{../saveuser}" th:object="${user}">
        <input type="hidden" th:field="*{id}" />
        <p>
            <label>Username: <input type="text" th:field="*{username}" /></label>
        </p>
        <p>
            <label>Password:
                <input type="password" th:field="*{passwordHash}" placeholder="Leave blank to keep unchanged" />
            </label>
        </p>
        <p>Role:
            <label th:each="r : ${roles}">
                <input type="radio" th:field="*{role}" th:value="${r}" th:text="${r}" />
            </label>
        </p>
        <p><input type="submit" value="Save User" /></p>
    </form>
</body>
</html>
