<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign List</title>
</head>
<body>
    <div th:replace="~{fragments :: nav}"></div>

    <h1>Campaigns</h1>

    <table>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Game</th>
            <th sec:authorize="hasRole('ADMIN')">User</th>
            <th>Status</th>
            <th></th>
        </tr>
        <tr th:each="campaign : ${campaigns}">
            <td th:text="${campaign.name}">Name</td>
            <td th:text="${campaign.description}">Description</td>
            <td th:text="${campaign.game.title}">Game</td>
            <td sec:authorize="hasRole('ADMIN')" th:text="${campaign.user.username}">User</td>
            <td th:text="${campaign.status}">Status</td>
            <td>
                <a th:href="@{/editcampaign/{id}(id=${campaign.id})}">Edit</a>
                <a th:href="@{/deletecampaign/{id}(id=${campaign.id})}">Delete</a>
            </td>
        </tr>
    </table>
    <p><a href="/addcampaign">New Campaign</a></p>
</body>
</html>
